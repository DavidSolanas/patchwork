# CI for v0.1.0 — keep invariant grep logic in sync with .claude/hooks/invariant-audit.sh
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

      - name: Invariant audits
        run: bash .claude/hooks/invariant-audit.sh
