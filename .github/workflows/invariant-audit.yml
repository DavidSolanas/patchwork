# Trusted invariant gate — workflow definition and audit code always come from
# the base branch (pull_request_target), not from the PR. PR code is checked out
# as data and inspected by scripts/invariant-audit.mjs; never run PR scripts here.
name: Invariant Audit

on:
  pull_request_target:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  invariant-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted audit code
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          persist-credentials: false

      - name: Checkout PR code as candidate data
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false

      - name: Checkout pushed code
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install trusted audit dependencies
        if: github.event_name == 'pull_request_target'
        working-directory: trusted
        run: npm ci --ignore-scripts

      - name: Install audit dependencies
        if: github.event_name == 'push'
        run: npm ci --ignore-scripts

      - name: Invariant audits for PR
        if: github.event_name == 'pull_request_target'
        run: node trusted/scripts/invariant-audit.mjs candidate

      - name: Invariant audits for push
        if: github.event_name == 'push'
        run: node scripts/invariant-audit.mjs .
